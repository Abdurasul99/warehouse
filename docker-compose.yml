services:
  postgres:
    image: postgres:16-alpine
    container_name: warehouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_system_warehouse
      POSTGRES_USER: sales_system
      POSTGRES_PASSWORD: sales_system_pass
    ports:
      - "5432:5432"
    volumes:
      - warehouse_postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_system -d sales_system_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  warehouse_postgres_data:
